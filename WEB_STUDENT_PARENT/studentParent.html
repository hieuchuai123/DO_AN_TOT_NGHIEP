<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Phụ huynh / Học sinh</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/studentParent.css">
</head>

<body>
    <div class="wrapper d-flex">
        <!-- Sidebar -->
        <aside class="sidebar">
            <img id="school-logo" src="/image/logo/THUẬN HIẾU-logo.png" alt="LOGO">
            <ul class="nav flex-column">
                <li class="nav-item"><a href="#" class="nav-link active" data-section="info">📘 Thông tin</a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-section="history">🕒 Lịch sử điểm danh</a></li>
                <li class="nav-item"><a href="#" class="nav-link" data-section="noti">🔔 Thông báo</a></li>
            </ul>
            <hr>
            <button class="btn btn-light w-100 mt-auto" id="logoutBtn">Đăng xuất</button>
        </aside>

        <!-- Main content -->
        <main class="content flex-grow-1">
            <!-- Phần tiêu đề tên trường -->
            <div class="school-header">
                <h4 class="school-header-title">TRƯỜNG TIỂU HỌC THUẬN HIẾU</h4>
            </div>

            <!-- Sections -->
            <!-- Thông tin học sinh -->
            <section id="section-info" class="content-section">
                <div class="section-title-container">
                    <h4 class="school-header-title">THÔNG TIN HỌC SINH</h4>
                </div>
                <div class="liner"></div>
                <div class="student-info-container">
                    <!-- Cột trái -->
                    <div class="student-sidebar">
                        <!-- Khung hiển thị thông tin học sinh -->
                        <div class="student-sidebar-info">
                            <div class="student-sidebar-info-content">
                                
                            </div>
                        </div>
                    </div>

                    <!-- Cột phải -->
                    <div class="student-detail">

                    </div>
                </div>

            </section>

            <!-- Lịch sử điểm danh -->
            <section id="section-history" class="content-section d-none">
                <div class="section-title-container">
                    <h4 class="school-header-title">LỊCH SỬ ĐIỂM DANH</h4>
                </div>
                <div class="liner"></div>
                <p>Hiển thị bảng hoặc timeline điểm danh RFID.</p>
            </section>

            <!-- Thông báo -->
            <section id="section-noti" class="content-section d-none">
                <div class="section-title-container">
                    <h4 class="school-header-title">THÔNG BÁO</h4>
                </div>
                <div class="liner"></div>
                <p>Danh sách thông báo quan trọng gửi đến phụ huynh và học sinh.</p>
            </section>
        </main>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/studentParent.js"></script>
</body>

</html>
